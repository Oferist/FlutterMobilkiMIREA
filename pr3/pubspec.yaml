name: pr3_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^4.0.3  # Добавляем пакет Google Fonts

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Добавляем кастомные шрифты
  fonts:
    - family: Courgette
      fonts:
        - asset: fonts/Courgette-Regular.ttf